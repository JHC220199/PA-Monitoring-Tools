<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senedd PRS Written Questions Monitor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  font-size: 14px;
  color: #0F2636;
  background: #F6F7F8;
  min-height: 100vh;
}
 
/* ── Header ── */
.header {
  background: #113B54;
  color: #FCFCFC;
  padding: 18px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.2px; }
.header-meta { font-size: 12px; color: rgba(252,252,252,0.55); margin-top: 2px; }
.header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.badge-senedd {
  background: #E96C19;
  color: #FCFCFC;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  letter-spacing: 0.02em;
}
 
/* ── Controls ── */
.controls {
  background: #FCFCFC;
  border-bottom: 1px solid #e2e8f0;
  padding: 12px 28px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
.controls input[type=text] {
  flex: 1;
  min-width: 200px;
  max-width: 360px;
  padding: 7px 12px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-size: 13px;
}
.controls input[type=text]:focus { outline: 2px solid #113B54; border-color: transparent; }
 
.btn {
  padding: 7px 16px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
  background: #FCFCFC;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.1s;
  color: #0F2636;
}
.btn:hover { background: #F6F7F8; }
.btn-primary { background: #E96C19; color: #FCFCFC; border-color: #E96C19; }
.btn-primary:hover { background: #c55c14; }
 
/* ── Stats ── */
.stats {
  display: flex;
  gap: 12px;
  padding: 16px 28px;
  background: #FCFCFC;
  border-bottom: 1px solid #e2e8f0;
  flex-wrap: wrap;
}
.stat { background: #F6F7F8; border-radius: 8px; padding: 10px 18px; }
.stat-label { font-size: 11px; color: #6b7280; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
.stat-value { font-size: 22px; font-weight: 600; color: #113B54; }
 
/* ── Main card ── */
.main { padding: 20px 28px; }
.card {
  background: #FCFCFC;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  overflow: hidden;
}
 
/* ── Week tabs ── */
.week-tabs-wrap {
  display: flex;
  align-items: center;
  border-bottom: 1px solid #e2e8f0;
  overflow-x: auto;
  padding: 0 4px 6px;
  scrollbar-width: thin;
  scrollbar-color: #cbd5e1 transparent;
}
.week-tabs-wrap::-webkit-scrollbar { height: 4px; }
.week-tabs-wrap::-webkit-scrollbar-track { background: transparent; }
.week-tabs-wrap::-webkit-scrollbar-thumb { background: #E96C19; border-radius: 4px; }
.week-tabs-wrap::-webkit-scrollbar-thumb:hover { background: #c55c14; }
 
.week-tab {
  padding: 12px 16px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 13px;
  color: #64748b;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color 0.15s;
  flex-shrink: 0;
}
.week-tab:hover { color: #1e293b; }
.week-tab.active {
  color: #113B54;
  font-weight: 600;
  border-bottom-color: #E96C19;
}
.week-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  margin-left: 5px;
  background: #f1f5f9;
  color: #64748b;
  transition: all 0.15s;
}
.week-tab.active .week-badge {
  background: #E96C19;
  color: #FCFCFC;
}
 
/* ── Column headers ── */
.col-headers {
  display: grid;
  grid-template-columns: 190px 58px 1fr 110px 110px;
  gap: 12px;
  padding: 8px 16px;
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: #94a3b8;
}
 
/* ── Question rows ── */
.q-row {
  display: grid;
  grid-template-columns: 190px 58px 1fr 110px 110px;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid #f1f5f9;
  cursor: pointer;
  transition: background 0.1s;
  align-items: start;
}
.q-row:last-child { border-bottom: none; }
.q-row:hover { background: #f8fafc; }
.q-row.group-start { border-top: 2px solid #fde8d8; }
.q-row.group-start:first-child { border-top: none; }
 
.q-member { font-size: 13px; font-weight: 600; color: #1e293b; line-height: 1.4; }
.q-member-area { font-size: 11px; color: #94a3b8; margin-top: 1px; }
.q-member-blank { color: transparent; user-select: none; font-size: 11px; }
 
.q-text {
  font-size: 12px;
  color: #374151;
  line-height: 1.6;
}
.q-text-inner {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  transition: all 0.2s;
}
.q-text-inner.expanded {
  display: block;
  -webkit-line-clamp: unset;
}
.q-link {
  display: inline-block;
  margin-top: 6px;
  font-size: 11px;
  color: #113B54;
  text-decoration: none;
  opacity: 0;
  transition: opacity 0.15s;
}
.q-row:hover .q-link,
.q-text-inner.expanded ~ .q-link { opacity: 1; }
.q-link:hover { text-decoration: underline; }
 
.q-date, .q-due {
  font-size: 12px;
  color: #64748b;
  padding-top: 1px;
}
.ans-answered { font-size: 11px; font-weight: 600; color: #16a34a; }
.ans-pending  { font-size: 11px; font-weight: 600; color: #E96C19; }
 
/* ── Party badges ── */
.party {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.p-Lab   { background: #fee2e2; color: #991b1b; }
.p-Con   { background: #dbeafe; color: #1e40af; }
.p-LD    { background: #fef3c7; color: #92400e; }
.p-PC    { background: #99f6e4; color: #134e4a; }
.p-Ref   { background: #cffafe; color: #0891b2; }
.p-Green { background: #bbf7d0; color: #14532d; }
.p-Ind   { background: #f1f5f9; color: #475569; }
.p-other { background: #f1f5f9; color: #475569; }
 
/* ── States ── */
.state-msg {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 48px 28px;
  color: #94a3b8;
  font-size: 14px;
}
.loading { padding: 60px 28px; text-align: center; color: #6b7280; }
</style>
</head>

<script>
let allData  = null;
let weeks    = [];
let activeWk = null;
 
const PARTY_MAP = {
  "Labour": "Lab", "Welsh Labour": "Lab",
  "Welsh Conservatives": "Con", "Welsh Conservative Party": "Con", "Conservative": "Con",
  "Plaid Cymru": "PC", "Plaid Cymru Group": "PC",
  "Liberal Democrats": "LD", "Liberal Democrat": "LD", "Welsh Liberal Democrats": "LD",
  "Reform UK": "Ref", "Reform UK Group": "Ref",
  "Wales Green Party": "Green", "Green Party": "Green",
  "Independent": "Ind", "Non-affiliated": "Ind",
};
 
function partyAbbrev(p) {
  if (PARTY_MAP[p]) return PARTY_MAP[p];
  var key = Object.keys(PARTY_MAP).find(function(k) { return p.startsWith(k) || k.startsWith(p); });
  return key ? PARTY_MAP[key] : p;
}
 
function partyClass(p) {
  var abbr = partyAbbrev(p);
  var known = ['Lab','Con','LD','PC','Ref','Green','Ind'];
  return known.includes(abbr) ? 'p-' + abbr : 'p-other';
}
 
function weekLabel(iso) {
  var d   = new Date(iso + 'T00:00:00Z');
  var day = d.getUTCDate();
  var mon = d.toLocaleString('en-GB', { month: 'long', timeZone: 'UTC' });
  var s   = ['th','st','nd','rd'];
  var v   = day % 100;
  return 'WC ' + day + (s[(v-20)%10] || s[v] || s[0]) + ' ' + mon;
}
 
function weekCommencing(dmy) {
  if (!dmy) return '';
  var parts = dmy.split('/').map(Number);
  var dt = new Date(parts[2], parts[1]-1, parts[0]);
  var dow = dt.getDay();
  dt.setDate(dt.getDate() - (dow === 0 ? 6 : dow - 1));
  return dt.toISOString().split('T')[0];
}
 
function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
 
function buildWeeks() {
  var query = (document.getElementById('search').value || '').toLowerCase().trim();
  var qs = allData.questions || [];
  var map = {};
  for (var i = 0; i < qs.length; i++) {
    var q = qs[i];
    var wc = weekCommencing(q.tabled_str);
    if (!wc) continue;
    if (query) {
      var hay = [q.snippet, q.full_question, q.member_name, q.member_area, q.wq_ref, q.party]
        .map(function(x) { return (x||'').toLowerCase(); }).join(' ');
      if (hay.indexOf(query) === -1) continue;
    }
    if (!map[wc]) map[wc] = { key: wc, label: weekLabel(wc), qs: [] };
    map[wc].qs.push(q);
  }
  weeks = Object.values(map).sort(function(a,b) { return b.key.localeCompare(a.key); });
}
 
function weekFiltered() {
  var w = weeks.find(function(w) { return w.key === activeWk; });
  return w ? w.qs : [];
}
 
async function load() {
  try {
    var r = await fetch('senedd_data.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    allData = await r.json();
 
    var lu = allData.generated ? new Date(allData.generated) : null;
    document.getElementById('header-meta').innerHTML = lu
      ? '<strong>Last updated</strong> ' + lu.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) + ' at ' + lu.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + '<br>Refreshes automatically every weekday morning'
      : 'Last updated: unknown';
 
    var qs = allData.questions || [];
    document.getElementById('stat-total').textContent = qs.length;
    var wkSet = {};
    qs.forEach(function(q) { var wc = weekCommencing(q.tabled_str); if (wc) wkSet[wc] = true; });
    document.getElementById('stat-weeks').textContent = Object.keys(wkSet).length;
    var memSet = {};
    qs.forEach(function(q) { if (q.member_name) memSet[q.member_name] = true; });
    document.getElementById('stat-members').textContent = Object.keys(memSet).length;
    document.getElementById('stats-wrap').style.display = 'flex';
 
    buildWeeks();
    activeWk = weeks.length ? weeks[0].key : null;
    renderCard();
  } catch(e) {
    document.getElementById('main-card').innerHTML =
      '<div class="state-msg">Could not load senedd_data.json<br><small>' + e.message + '</small></div>';
  }
}
 
function renderCard() {
  buildWeeks();
  var card = document.getElementById('main-card');
 
  if (!weeks.length) {
    card.innerHTML = '<div class="state-msg">' +
      '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
      '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>' +
      '</svg>No questions found for this filter.</div>';
    return;
  }
 
  if (!weeks.find(function(w) { return w.key === activeWk; })) activeWk = weeks[0].key;
 
  var tabsHtml = '<div class="week-tabs-wrap" id="week-tabs">';
  for (var t = 0; t < weeks.length; t++) {
    var w = weeks[t];
    tabsHtml += '<button class="week-tab ' + (w.key === activeWk ? 'active' : '') + '" data-key="' + esc(w.key) + '">'
      + esc(w.label) + '<span class="week-badge">' + w.qs.length + '</span></button>';
  }
  tabsHtml += '</div>';
 
  var qs = weekFiltered();
  var questionsHtml = '';
 
  if (!qs.length) {
    questionsHtml = '<div class="state-msg">No questions for this week.</div>';
  } else {
    questionsHtml = '<div class="col-headers">' +
      '<div>Member</div><div>Party</div><div>Question</div>' +
      '<div>Date tabled</div><div>Answered?</div></div>';
 
    var lastMember = null;
    for (var i = 0; i < qs.length; i++) {
      var q = qs[i];
      var isNew  = q.member_name !== lastMember;
      var pAbbr  = partyAbbrev(q.party || '');
      var pCls   = partyClass(q.party || '');
      var rowCls = 'q-row' + (isNew && lastMember !== null ? ' group-start' : '');
      var txt    = q.full_question || q.snippet || '';
      var qUrl   = 'https://record.senedd.wales' + (q.url_path || '');
      var isAns  = !!q.answered_on;
 
      questionsHtml += '<div class="' + rowCls + '" onclick="toggleRow(this)">'
        + '<div class="' + (isNew ? 'q-member' : 'q-member-blank') + '">'
        + (isNew ? esc(q.member_name) : '&mdash;')
        + (isNew && q.member_area ? '<div class="q-member-area">' + esc(q.member_area) + '</div>' : '')
        + '</div>'
        + '<div>' + (isNew && q.party ? '<span class="party ' + pCls + '">' + esc(pAbbr) + '</span>' : '') + '</div>'
        + '<div class="q-text">'
        + '<div class="q-text-inner">' + esc(txt) + '</div>'
        + '<a class="q-link" href="' + esc(qUrl) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">View on Senedd website &rarr;</a>'
        + '</div>'
        + '<div class="q-date">' + esc(q.tabled_str || '') + '</div>'
        + '<div class="q-due">'
        + (isAns
            ? '<span class="ans-answered">&check; Answered</span>'
            : '<span class="ans-pending">' + (q.answer_str ? esc(q.answer_str) : 'Pending') + '</span>')
        + (isAns && q.answered_by ? '<div style="font-size:10px;color:#94a3b8;margin-top:3px">' + esc(q.answered_by) + '</div>' : '')
        + '</div></div>';
 
      lastMember = q.member_name;
    }
  }
 
  card.innerHTML = tabsHtml + questionsHtml;
 
  card.querySelectorAll('.week-tab').forEach(function(btn) {
    btn.addEventListener('click', function() {
      activeWk = btn.dataset.key;
      renderCard();
    });
  });
}
 
function toggleRow(row) {
  row.querySelector('.q-text-inner').classList.toggle('expanded');
}
 
function downloadExcel() {
  if (!allData) return;
  var wb = XLSX.utils.book_new();
 
  var sumRows = [
    ['Senedd PRS Written Questions Monitor'],
    ['Generated: ' + new Date(allData.generated).toLocaleString('en-GB')],
    ['Total questions: ' + (allData.questions||[]).length],
    [],
    ['Week', 'Questions'],
  ];
  var wkMap = {};
  (allData.questions||[]).forEach(function(q) {
    var wc = weekCommencing(q.tabled_str);
    if (wc) { if (!wkMap[wc]) wkMap[wc] = []; wkMap[wc].push(q); }
  });
  Object.keys(wkMap).sort().forEach(function(w) { sumRows.push([weekLabel(w), wkMap[w].length]); });
  var sumSheet = XLSX.utils.aoa_to_sheet(sumRows);
  sumSheet['!cols'] = [{wch:30},{wch:12}];
  XLSX.utils.book_append_sheet(wb, sumSheet, 'Summary');
 
  Object.keys(wkMap).sort().forEach(function(w) {
    var qs = wkMap[w];
    var rows = [['Member','Party','Constituency/Region','Question','Tabled','Answered?','Answered by','Link']];
    qs.forEach(function(q) { rows.push([
      q.member_name||'', q.party||'', q.member_area||'',
      q.full_question||q.snippet||'', q.tabled_str||'',
      q.answered_on ? 'Yes' : 'Pending', q.answered_by||'',
      'https://record.senedd.wales'+(q.url_path||''),
    ]); });
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [20,8,22,65,12,10,35,40].map(function(w) { return {wch:w}; });
    XLSX.utils.book_append_sheet(wb, ws, weekLabel(w).slice(0,31));
  });
 
  var today = new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb, 'senedd_wq_' + today + '.xlsx');
}
 
load();
</script>
