name: Update Parliamentary Questions

on:
  schedule:
    # Runs at 8:00 AM UTC (9am in winter, 8am in summer — adjust if needed)
    - cron: '0 8 * * 1-5'
  workflow_dispatch:  # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and update questions
        run: python parliament_monitor.py

      - name: Commit and push updated data
        run: |
          git config user.name  "Parliament Monitor Bot"
          git config user.email "action@github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Update questions: $(date -u '+%d %b %Y %H:%M UTC')"
          git push
