name: Update Parliamentary Questions
 
on:
  schedule:
    - cron: '0 8 * * 1-5'   # 9am BST (British Summer Time, late Mar–late Oct)
    - cron: '0 9 * * 1-5'   # 9am GMT (Greenwich Mean Time, late Oct–late Mar)
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
 
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Fetch and update questions
        run: python parliament_monitor.py
 
      - name: Commit and push updated data
        run: |
          git config user.name  "Parliament Monitor Bot"
          git config user.email "action@github.com"
          git add docs/data.json
          git commit -m "Update questions: $(date -u '+%d %b %Y %H:%M UTC')"
          git push
 
