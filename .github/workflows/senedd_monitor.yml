name: Update Senedd Questions

on:
  schedule:
    - cron: '0 8 * * 1-5'   # 8am UTC Mon–Fri (9am UK winter, 8am UK summer)
  workflow_dispatch:          # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch and update Senedd questions
        run: python senedd_monitor.py

      - name: Commit and push updated data
        run: |
          git config user.name  "Senedd Monitor Bot"
          git config user.email "action@github.com"
          git add docs/senedd_data.json
          git diff --staged --quiet || git commit -m "Update Senedd questions: $(date -u '+%d %b %Y %H:%M UTC')"
          git push
